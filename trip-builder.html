<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel By Petal — Trip Builder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #5ba4c9; --primary-dark: #3d8ab3; --accent: #c9a84c; --bg: #f0f4f8; --card: #fff; --text: #2d3748; --text-light: #718096; --border: #e2e8f0; --success: #48bb78; --radius: 12px; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Heebo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

        /* Header */
        .tb-header { background: white; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 1px 4px rgba(0,0,0,0.06); position: sticky; top: 0; z-index: 100; }
        .tb-header-right { display: flex; align-items: center; gap: 12px; }
        .tb-logo { font-family: 'Dancing Script', cursive; font-size: 1.4rem; color: var(--primary); font-weight: 700; text-decoration: none; }
        .tb-back { color: var(--primary); text-decoration: none; font-size: 0.88rem; font-weight: 500; }

        /* Layout */
        .tb-layout { display: grid; grid-template-columns: 1fr 320px; max-width: 1200px; margin: 0 auto; padding: 24px; gap: 24px; min-height: calc(100vh - 64px); }

        /* Days Panel */
        .tb-days { display: flex; flex-direction: column; gap: 20px; }
        .tb-setup { background: var(--card); border-radius: var(--radius); padding: 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
        .tb-setup h2 { font-size: 1.3rem; margin-bottom: 16px; }
        .tb-setup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .tb-field label { display: block; font-size: 0.82rem; font-weight: 600; margin-bottom: 4px; color: var(--text-light); }
        .tb-field input, .tb-field select { width: 100%; padding: 10px 12px; border: 2px solid var(--border); border-radius: 8px; font-family: inherit; font-size: 0.9rem; }
        .tb-field input:focus, .tb-field select:focus { outline: none; border-color: var(--primary); }
        .tb-gen-btn { grid-column: span 2; background: var(--primary); color: white; border: none; padding: 12px; border-radius: 10px; font-family: inherit; font-size: 0.95rem; font-weight: 600; cursor: pointer; margin-top: 8px; transition: all 0.2s; }
        .tb-gen-btn:hover { background: var(--primary-dark); }

        /* Day Card */
        .tb-day { background: var(--card); border-radius: var(--radius); box-shadow: 0 1px 4px rgba(0,0,0,0.06); overflow: hidden; }
        .tb-day-header { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; }
        .tb-day-header h3 { font-size: 1rem; }
        .tb-day-date { font-size: 0.82rem; opacity: 0.85; }
        .tb-day-body { padding: 16px 20px; }

        /* Activity Item */
        .tb-activity { display: flex; align-items: flex-start; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
        .tb-activity:last-child { border-bottom: none; }
        .tb-act-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0; }
        .tb-act-icon.hotel { background: #ebf8ff; }
        .tb-act-icon.activity { background: #fefcbf; }
        .tb-act-icon.food { background: #fed7e2; }
        .tb-act-icon.transport { background: #e9d8fd; }
        .tb-act-info { flex: 1; }
        .tb-act-info h4 { font-size: 0.9rem; margin-bottom: 2px; }
        .tb-act-info p { font-size: 0.8rem; color: var(--text-light); }
        .tb-act-price { font-weight: 700; color: var(--accent); font-size: 0.9rem; white-space: nowrap; }
        .tb-act-remove { background: none; border: none; color: #e53e3e; cursor: pointer; font-size: 1.1rem; padding: 4px; }

        /* Add Activity */
        .tb-add-act { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
        .tb-add-btn { padding: 6px 14px; border: 1.5px dashed var(--border); border-radius: 20px; background: none; font-family: inherit; font-size: 0.8rem; cursor: pointer; color: var(--text-light); transition: all 0.2s; }
        .tb-add-btn:hover { border-color: var(--primary); color: var(--primary); background: #ebf8ff; }

        /* Sidebar */
        .tb-sidebar { position: sticky; top: 88px; height: fit-content; }
        .tb-summary { background: var(--card); border-radius: var(--radius); padding: 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
        .tb-summary h3 { font-size: 1.1rem; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .tb-summary-row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 0.88rem; border-bottom: 1px solid var(--border); }
        .tb-summary-row:last-of-type { border-bottom: none; }
        .tb-summary-total { display: flex; justify-content: space-between; padding: 16px 0 0; margin-top: 8px; border-top: 2px solid var(--primary); font-size: 1.2rem; font-weight: 700; }
        .tb-summary-total span:last-child { color: var(--primary); }
        .tb-summary-actions { margin-top: 20px; display: flex; flex-direction: column; gap: 8px; }
        .tb-summary-actions a, .tb-summary-actions button { display: block; width: 100%; padding: 12px; border-radius: 10px; font-family: inherit; font-size: 0.9rem; font-weight: 600; text-align: center; cursor: pointer; text-decoration: none; border: none; transition: all 0.2s; }
        .tb-btn-primary { background: var(--primary); color: white; }
        .tb-btn-primary:hover { background: var(--primary-dark); }
        .tb-btn-wa { background: #25D366; color: white; }
        .tb-btn-wa:hover { background: #1da851; }
        .tb-btn-outline { background: white; color: var(--primary); border: 2px solid var(--primary) !important; }

        /* Add modal */
        .tb-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
        .tb-modal-content { background: white; border-radius: 16px; padding: 28px; width: 90%; max-width: 450px; max-height: 80vh; overflow-y: auto; }
        .tb-modal-content h3 { margin-bottom: 16px; }
        .tb-modal-close { float: left; background: none; border: none; font-size: 1.4rem; cursor: pointer; color: var(--text-light); }
        .tb-option { padding: 12px; border: 2px solid var(--border); border-radius: 10px; margin-bottom: 8px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: all 0.2s; }
        .tb-option:hover { border-color: var(--primary); background: #f7fafc; }
        .tb-option-info { flex: 1; }
        .tb-option-info h4 { font-size: 0.9rem; }
        .tb-option-info p { font-size: 0.78rem; color: var(--text-light); }
        .tb-option-price { font-weight: 700; color: var(--accent); }

        .tb-empty { text-align: center; padding: 40px; color: var(--text-light); }
        .tb-empty p { margin-bottom: 12px; }

        @media (max-width: 768px) {
            .tb-layout { grid-template-columns: 1fr; }
            .tb-sidebar { position: static; }
            .tb-setup-grid { grid-template-columns: 1fr; }
            .tb-gen-btn { grid-column: span 1; }
        }
    </style>
</head>

        <!-- Sidebar -->

    <!-- Add Activity Modal -->

    let tripDays = [];
    let currentDayIndex = -1;
    let currentCategory = '';

    // === GENERATE TRIP ===
    function generateTrip() {
        const dest = document.getElementById('tbDest').value;
        const numDays = parseInt(document.getElementById('tbDays').value);
        const startDate = document.getElementById('tbStartDate').value;
        const destData = destinations[dest];

        tripDays = [];
        for (let i = 0; i < numDays; i++) {
            let dateStr = '';
            if (startDate) {
                const d = new Date(startDate);
                d.setDate(d.getDate() + i);
                dateStr = d.toLocaleDateString('he-IL', { weekday: 'long', day: 'numeric', month: 'long' });
            }
            tripDays.push({
                dayNum: i + 1,
                date: dateStr,
                hotel: i === 0 ? destData.hotels[1] : null, // Auto-add mid-range hotel on day 1
                activities: [],
                restaurants: [],
                transport: i === 0 ? [destData.transport[0]] : [], // Auto-add airport transfer day 1
            });
        }

        renderTrip();
        updateSummary();
    }

    // === RENDER ===
    function renderTrip() {
        const container = document.getElementById('tbDaysContainer');
        const dest = document.getElementById('tbDest').value;
        const destData = destinations[dest];

        container.innerHTML = tripDays.map((day, i) => `
            <div class="tb-day">
                <div class="tb-day-header">
                    <h3>Day ${day.dayNum} — ${destData.name} ${destData.emoji}</h3>
                    <span class="tb-day-date">${day.date || ''}</span>
                </div>
                <div class="tb-day-body">
                    ${day.hotel ? `
                    <div class="tb-activity">
                        <div class="tb-act-icon hotel">🏨</div>
                        <div class="tb-act-info"><h4>${day.hotel.name}</h4><p>${day.hotel.desc}</p></div>
                        <span class="tb-act-price">₪${day.hotel.price}/night</span>
                        <button class="tb-act-remove" onclick="removeItem(${i},'hotel')">&times;</button>
                    </div>` : ''}
                    ${day.transport.map((t, ti) => `
                    <div class="tb-activity">
                        <div class="tb-act-icon transport">${t.icon || '🚐'}</div>
                        <div class="tb-act-info"><h4>${t.name}</h4><p>${t.desc}</p></div>
                        <span class="tb-act-price">₪${t.price}</span>
                        <button class="tb-act-remove" onclick="removeItem(${i},'transport',${ti})">&times;</button>
                    </div>`).join('')}
                    ${day.activities.map((a, ai) => `
                    <div class="tb-activity">
                        <div class="tb-act-icon activity">${a.icon || '🎫'}</div>
                        <div class="tb-act-info"><h4>${a.name}</h4><p>${a.desc}</p></div>
                        <span class="tb-act-price">₪${a.price}</span>
                        <button class="tb-act-remove" onclick="removeItem(${i},'activities',${ai})">&times;</button>
                    </div>`).join('')}
                    ${day.restaurants.map((r, ri) => `
                    <div class="tb-activity">
                        <div class="tb-act-icon food">${r.icon || '🍽️'}</div>
                        <div class="tb-act-info"><h4>${r.name}</h4><p>${r.desc}</p></div>
                        <span class="tb-act-price">₪${r.price}</span>
                        <button class="tb-act-remove" onclick="removeItem(${i},'restaurants',${ri})">&times;</button>
                    </div>`).join('')}
                    <div class="tb-add-act">
                        ${!day.hotel ? `<button class="tb-add-btn" onclick="openAddModal(${i},'hotels')">+ Hotel</button>` : ''}
                        <button class="tb-add-btn" onclick="openAddModal(${i},'activities')">+ Activity</button>
                        <button class="tb-add-btn" onclick="openAddModal(${i},'restaurants')">+ Restaurant</button>
                        <button class="tb-add-btn" onclick="openAddModal(${i},'transport')">+ Transport</button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    // === ADD/REMOVE ITEMS ===
    function openAddModal(dayIndex, category) {
        currentDayIndex = dayIndex;
        currentCategory = category;
        const dest = document.getElementById('tbDest').value;
        const destData = destinations[dest];
        const items = category === 'hotels' ? destData.hotels : destData[category];

        document.getElementById('addModalTitle').textContent =
            category === 'hotels' ? '🏨 Choose Hotel' :
            category === 'activities' ? '🎫 Add Activity' :
            category === 'restaurants' ? '🍽️ Add Restaurant' : '🚐 Add Transport';

        document.getElementById('addModalOptions').innerHTML = items.map((item, idx) => `
            <div class="tb-option" onclick="addItem(${idx})">
                <span style="font-size:1.5rem">${item.icon || (category === 'hotels' ? '🏨' : '🎫')}</span>
                <div class="tb-option-info"><h4>${item.name}</h4><p>${item.desc}</p></div>
                <span class="tb-option-price">₪${item.price}${category === 'hotels' ? '/night' : ''}</span>
            </div>
        `).join('');

        document.getElementById('addModal').style.display = 'flex';
    }

    function addItem(itemIdx) {
        const dest = document.getElementById('tbDest').value;
        const destData = destinations[dest];

        if (currentCategory === 'hotels') {
            tripDays[currentDayIndex].hotel = destData.hotels[itemIdx];
        } else {
            const item = destData[currentCategory][itemIdx];
            tripDays[currentDayIndex][currentCategory].push({ ...item });
        }

        closeAddModal();
        renderTrip();
        updateSummary();
    }

    function removeItem(dayIdx, category, itemIdx) {
        if (category === 'hotel') {
            tripDays[dayIdx].hotel = null;
        } else {
            tripDays[dayIdx][category].splice(itemIdx, 1);
        }
        renderTrip();
        updateSummary();
    }

    function closeAddModal() {
        document.getElementById('addModal').style.display = 'none';
    }

    // === SUMMARY ===
    function updateSummary() {
        let hotelTotal = 0, actTotal = 0, foodTotal = 0, transportTotal = 0;
        const travelers = parseInt(document.getElementById('tbTravelers').value) || 1;

        tripDays.forEach(day => {
            if (day.hotel) hotelTotal += day.hotel.price;
            day.activities.forEach(a => actTotal += a.price);
            day.restaurants.forEach(r => foodTotal += r.price);
            day.transport.forEach(t => transportTotal += t.price);
        });

        // Activities and food multiply by travelers
        const perPersonCosts = (actTotal + foodTotal + transportTotal) * travelers;
        const total = hotelTotal + perPersonCosts;

        document.getElementById('tbSummaryRows').innerHTML = `
            <div class="tb-summary-row"><span>🏨 Hotels (${tripDays.length} nights)</span><span>₪${hotelTotal.toLocaleString()}</span></div>
            <div class="tb-summary-row"><span>🎫 Activities</span><span>₪${(actTotal * travelers).toLocaleString()}</span></div>
            <div class="tb-summary-row"><span>🍽️ Restaurants</span><span>₪${(foodTotal * travelers).toLocaleString()}</span></div>
            <div class="tb-summary-row"><span>🚐 Transport</span><span>₪${(transportTotal * travelers).toLocaleString()}</span></div>
            <div class="tb-summary-row" style="color:var(--text-light);font-size:0.8rem"><span>× ${travelers} travelers</span><span></span></div>
        `;

        document.getElementById('tbTotal').style.display = 'flex';
        document.getElementById('tbTotalAmount').textContent = '₪' + total.toLocaleString();
        document.getElementById('tbActions').style.display = 'flex';

        // WhatsApp link
        const dest = destinations[document.getElementById('tbDest').value];
        const msg = `היי! בניתי טיול ל${dest.name} באתר:\n${tripDays.length} ימים, ${travelers} מטיילים\nסה"כ משוער: ₪${total.toLocaleString()}\nאשמח להצעת מחיר רשמית!`;
        document.getElementById('tbWhatsAppLink').href = `https://wa.me/972545581269?text=${encodeURIComponent(msg)}`;
    }

    // === EXPORT ===
    function exportTrip() {
        const dest = destinations[document.getElementById('tbDest').value];
        const travelers = document.getElementById('tbTravelers').value;
        let text = `✈️ Trip Plan — ${dest.name} ${dest.emoji}\n`;
        text += `${tripDays.length} Days | ${travelers} Travelers\n`;
        text += '─'.repeat(40) + '\n\n';

        tripDays.forEach(day => {
            text += `📅 Day ${day.dayNum} ${day.date ? '— ' + day.date : ''}\n`;
            if (day.hotel) text += `  🏨 ${day.hotel.name} — ₪${day.hotel.price}/night\n`;
            day.transport.forEach(t => text += `  🚐 ${t.name} — ₪${t.price}\n`);
            day.activities.forEach(a => text += `  🎫 ${a.name} — ₪${a.price}\n`);
            day.restaurants.forEach(r => text += `  🍽️ ${r.name} — ₪${r.price}\n`);
            text += '\n';
        });

        text += '─'.repeat(40) + '\n';
        text += `💰 Total: ${document.getElementById('tbTotalAmount').textContent}\n`;
        text += `\n📱 Travel By Petal — 054-558-1269\n🌐 https://matanm98.github.io/TravelByPetal/`;

        // Copy to clipboard
        navigator.clipboard.writeText(text).then(() => {
            alert('Trip plan copied to clipboard!');
        }).catch(() => {
            // Fallback
            const ta = document.createElement('textarea');
            ta.value = text;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            ta.remove();
            alert('Trip plan copied to clipboard!');
        });
    }

    // Set default start date to next week
    const nextWeek = new Date();
    nextWeek.setDate(nextWeek.getDate() + 7);
    document.getElementById('tbStartDate').value = nextWeek.toISOString().split('T')[0];
    </script>
</body>
</html>
